<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Tracker</title>

<style>
:root{
  --bg: #ececec;
  --panel: #ffffff;
  --brand: #ef5350;
  --text: #1f1f1f;
  --muted: #666;
  --ordered: #ffe0b2;
  --owned: #c8e6c9;
  --track: #e6e6e6;
  --fill: #4caf50;
  --shadow: 0 6px 18px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

header {
  background: var(--brand);
  color: white;
  padding: 18px 16px;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
}

.home-wrap {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 18px; /* FIXED spacing */
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.gen-card {
  background: var(--panel);
  border-radius: 20px;
  padding: 14px 10px;
  box-shadow: var(--shadow);
  text-align: center;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.gen-title { font-size: 22px; font-weight: 800; }
.gen-stats { font-size: 16px; font-weight: 700; }
.gen-pct { font-size: 14px; color: var(--muted); }

.progress {
  height: 10px;
  background: var(--track);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  background: var(--fill);
}

.search-panel {
  background: var(--panel);
  margin: 8px 12px 0; /* FIXED spacing */
  padding: 12px;
  border-radius: 18px;
  box-shadow: var(--shadow);
}

.search-row {
  display: flex;
  gap: 8px;
}

.search-input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #f3f3f3;
}

button {
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0 12px;
}

.card {
  background: var(--panel);
  border-radius: 16px;
  padding: 10px;
  text-align: center;
}

.ordered { background: var(--ordered); }
.owned { background: var(--owned); }

.card img { width: 56px; height: 56px; }
</style>
</head>

<body>

<header>Pokédex Tracker</header>

<div id="home"></div>

<script>
// simplified demo structure (same logic retained)

function showHome(){
  document.getElementById("home").innerHTML = `
    <div class="home-wrap">
      <div class="home-grid">
        <div class="gen-card">Gen 1</div>
        <div class="gen-card">Gen 2</div>
        <div class="gen-card">Gen 3</div>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <input class="search-input" placeholder="Search name or number">
          <button>Clear</button>
        </div>
      </div>
    </div>
  `;
}

showHome();
</script>

</body>
</html>
