<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pokedex Tracker</title>\n    <style>\n        .card-container {\n            display: flex;\n            flex-wrap: wrap;\n            justify-content: center;\n            gap: 10px;\n            padding: 0;\n        }\n        .card {\n            width: 100px;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            padding: 5px;\n            box-sizing: border-box;\n        }\n        .pokemon-image {\n            width: 64px;\n        }\n        @media (max-width: 375px) { // For iPhone 12 Pro (375px width)\n            .card-container {\n                grid-template-columns: repeat(4, 1fr);\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class="card-container">\n        <!-- Example card -->\n        <div class="card">\n            <img class="pokemon-image" src="pokemon_image_url" alt="Pokemon Name">\n            <p>Pokemon Name</p>\n        </div>\n        <!-- Additional cards go here -->\n    </div>\n</body>\n</html>
