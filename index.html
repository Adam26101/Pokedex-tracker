<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Tracker Ultimate</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --panel:#ffffff;
  --panel-soft:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --brand:#ef5350;
  --brand-dark:#d32f2f;
  --yellow:#ffcb05;
  --blue:#2a75bb;
  --owned:#c8f7c5;
  --ordered:#ffe7b3;
  --missing:#ffffff;
  --fav:#fff0f4;
  --track:#e2e8f0;
  --fill:#22c55e;
  --shadow:0 10px 30px rgba(0,0,0,0.12);
  --shadow-soft:0 6px 18px rgba(0,0,0,0.10);
  --radius:20px;
  --radius-sm:14px;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 25%),
    linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 220px, #eef2f7 220px, #eef2f7 100%);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,0.12), transparent 18%),
    radial-gradient(circle at 88% 25%, rgba(255,255,255,0.10), transparent 18%),
    linear-gradient(135deg, #ef5350 0%, #d32f2f 100%);
  color:#fff;
  padding:14px 14px 18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.header-inner{
  max-width:1100px;
  margin:0 auto;
}

.logo-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo-row img{
  height:52px;
  width:auto;
  display:block;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.25));
}

.header-sub{
  text-align:center;
  font-size:13px;
  font-weight:800;
  letter-spacing:.4px;
  opacity:.95;
  margin-top:4px;
}

.shell{
  max-width:1100px;
  margin:0 auto;
  padding:14px;
}

.hidden{display:none !important}

button, select, input, textarea{
  font:inherit;
}

button{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  font-weight:800;
  cursor:pointer;
  background:#fff;
  color:var(--text);
  box-shadow:var(--shadow-soft);
}

button.primary{
  background:linear-gradient(135deg, var(--yellow), #ffd84d);
  color:#1f2937;
}

button.secondary{
  background:#fff;
}

button.danger{
  background:#fee2e2;
  color:#991b1b;
}

button.ghost{
  background:#f8fafc;
}

button.small{
  padding:8px 10px;
  border-radius:12px;
  font-size:13px;
}

.topbar{
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}

.topbar-center{
  flex:1;
  text-align:center;
  font-weight:900;
  color:#fff;
}

.section{
  background:var(--panel);
  border-radius:24px;
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}

.hero{
  overflow:hidden;
  position:relative;
  background:
    radial-gradient(circle at top right, rgba(255,203,5,0.26), transparent 25%),
    radial-gradient(circle at bottom left, rgba(42,117,187,0.16), transparent 25%),
    linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
}

.hero:before{
  content:"";
  position:absolute;
  width:140px;
  height:140px;
  border-radius:50%;
  right:-40px;
  top:-40px;
  background:rgba(239,83,80,0.10);
}

.hero-title{
  font-size:28px;
  font-weight:900;
  margin:0 0 6px;
  line-height:1;
}

.hero-sub{
  color:var(--muted);
  font-size:14px;
  font-weight:600;
  margin-bottom:16px;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat-card{
  background:var(--panel-soft);
  border-radius:18px;
  padding:14px 10px;
  text-align:center;
}

.stat-value{
  font-size:24px;
  font-weight:900;
  line-height:1;
  margin-bottom:6px;
}

.stat-label{
  font-size:11px;
  font-weight:800;
  letter-spacing:.4px;
  text-transform:uppercase;
  color:var(--muted);
}

.progress{
  height:12px;
  background:var(--track);
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.progress-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, #22c55e, #16a34a);
}

.progress-fill.complete{
  background:linear-gradient(90deg, #2a75bb, #1d4ed8);
}

.panel-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.panel-title h2,
.panel-title h3{
  margin:0;
  font-size:18px;
  font-weight:900;
}

.panel-note{
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.search-panel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.search-row{
  display:flex;
  gap:8px;
}

.search-input{
  flex:1;
  min-width:0;
  border:none;
  outline:none;
  background:#f1f5f9;
  border-radius:14px;
  padding:13px 14px;
  color:var(--text);
  font-size:16px;
}

.helper{
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}

.filter-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  padding:9px 12px;
  border-radius:999px;
  background:#f8fafc;
  border:2px solid transparent;
  box-shadow:none;
  font-size:13px;
  font-weight:800;
}

.chip.active{
  background:#fff7cc;
  border-color:#ffe082;
}

.home-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.gen-card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#fff 0%, #f8fafc 100%);
  border-radius:22px;
  padding:14px;
  min-height:185px;
  text-align:center;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .12s ease;
}

.gen-card:active{
  transform:scale(.98);
}

.gen-card:before{
  content:"";
  position:absolute;
  width:96px;
  height:96px;
  border-radius:50%;
  top:-28px;
  right:-28px;
  background:rgba(255,255,255,0.55);
}

.region-badge{
  width:58px;
  height:58px;
  border-radius:18px;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:20px;
  margin:0 auto 10px;
  box-shadow:var(--shadow-soft);
  position:relative;
  z-index:1;
}

.gen-title{
  font-size:22px;
  font-weight:900;
  margin:0 0 4px;
  position:relative;
  z-index:1;
}

.gen-subtitle{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:12px;
  position:relative;
  z-index:1;
}

.gen-stats{
  font-size:18px;
  font-weight:900;
  position:relative;
  z-index:1;
}

.gen-pct{
  font-size:13px;
  color:var(--muted);
  font-weight:800;
  margin-top:4px;
  position:relative;
  z-index:1;
}

.two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.side-stack{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.activity-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.activity-item{
  background:#f8fafc;
  border-radius:14px;
  padding:10px 12px;
  font-size:13px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.card{
  position:relative;
  background:var(--missing);
  border-radius:18px;
  padding:10px 8px 8px;
  min-height:158px;
  text-align:center;
  box-shadow:var(--shadow-soft);
  transition:transform .1s ease, box-shadow .1s ease;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

.card:active{
  transform:scale(.98);
}

.card.ordered{
  background:var(--ordered);
}

.card.owned{
  background:var(--owned);
}

.card.fav-ring{
  box-shadow:0 0 0 2px #f9a8d4 inset, var(--shadow-soft);
}

.card-main{
  cursor:pointer;
}

.card img{
  width:72px;
  height:72px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
  pointer-events:none;
}

.number{
  font-size:11px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:3px;
  pointer-events:none;
}

.name{
  font-size:12px;
  line-height:1.15;
  font-weight:800;
  word-break:break-word;
  pointer-events:none;
}

.name.small{font-size:11px}
.name.xsmall{font-size:10px}

.state-label{
  margin-top:5px;
  font-size:10px;
  color:var(--muted);
  font-weight:900;
  letter-spacing:.3px;
  pointer-events:none;
}

.card-actions{
  position:absolute;
  top:7px;
  right:7px;
  display:flex;
  gap:5px;
}

.icon-btn{
  width:28px;
  height:28px;
  border-radius:999px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.82);
  box-shadow:none;
  font-size:14px;
  border:1px solid rgba(0,0,0,0.05);
}

.icon-btn.active{
  background:#ffe4ef;
}

.muted{
  color:var(--muted);
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:16px 8px;
  font-weight:700;
}

.footer-space{
  height:30px;
}

.quick-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.inline-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.mini-stat{
  background:#f8fafc;
  border-radius:14px;
  padding:12px 10px;
  text-align:center;
}

.mini-stat-value{
  font-size:20px;
  font-weight:900;
  line-height:1;
  margin-bottom:4px;
}

.mini-stat-label{
  font-size:11px;
  color:var(--muted);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.4px;
}

.note-box{
  background:#eff6ff;
  color:#1d4ed8;
  border-radius:14px;
  padding:10px 12px;
  font-size:13px;
  font-weight:700;
}

.file-input{
  display:none;
}

.search-results-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.search-result{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:16px;
  background:#f8fafc;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
}

.search-result img{
  width:56px;
  height:56px;
  object-fit:contain;
  flex:0 0 auto;
}

.search-result-main{
  flex:1;
  min-width:0;
}

.search-result-title{
  font-size:16px;
  font-weight:900;
  margin-bottom:3px;
}

.search-result-meta{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
  line-height:1.4;
}

.search-result-state{
  font-size:11px;
  font-weight:900;
  color:var(--muted);
  margin-top:5px;
  text-transform:uppercase;
  letter-spacing:.4px;
}

.achievements-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.achievement-card{
  border-radius:18px;
  padding:14px;
  background:#f8fafc;
  box-shadow:var(--shadow-soft);
  border:2px solid transparent;
}

.achievement-card.complete{
  background:linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
  border-color:#bfdbfe;
}

.achievement-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:8px;
}

.achievement-title{
  font-size:16px;
  font-weight:900;
  margin-bottom:4px;
}

.achievement-desc{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
}

.achievement-status{
  flex:0 0 auto;
  font-size:11px;
  font-weight:900;
  letter-spacing:.4px;
  text-transform:uppercase;
  padding:7px 10px;
  border-radius:999px;
  background:#fff7cc;
  color:#8a6400;
}

.achievement-card.complete .achievement-status{
  background:#dbeafe;
  color:#1d4ed8;
}

.achievement-meta{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}

.bottom-link-wrap{
  text-align:center;
  margin-top:6px;
}

.bottom-link-wrap button{
  background:#f8fafc;
}

@media (max-width: 900px){
  .home-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(4,1fr)}
}

@media (max-width: 640px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(3,1fr)}
  .logo-row img{height:46px}
  .hero-title{font-size:24px}
}

@media (max-width: 390px){
  .home-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(3,1fr)}
  .card{min-height:146px}
  .card img{width:62px;height:62px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-row">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokémon">
    </div>
    <div class="header-sub">Ultimate Pokédex Collection Tracker</div>
  </div>
</header>

<div class="shell">
  <div id="home"></div>
  <div id="app" class="hidden"></div>
  <div id="achievements-page" class="hidden"></div>
  <div class="footer-space"></div>
</div>

<input id="import-file" class="file-input" type="file" accept=".json,application/json">

<script>
const TOTAL_POKEMON = 1025;

const gens = [
  {id:1, start:1, end:151, region:"Kanto", badge:"KA", color:"linear-gradient(135deg,#ef5350,#fb8c00)"},
  {id:2, start:152, end:251, region:"Johto", badge:"JO", color:"linear-gradient(135deg,#42a5f5,#5c6bc0)"},
  {id:3, start:252, end:386, region:"Hoenn", badge:"HO", color:"linear-gradient(135deg,#26a69a,#66bb6a)"},
  {id:4, start:387, end:493, region:"Sinnoh", badge:"SI", color:"linear-gradient(135deg,#7e57c2,#5c6bc0)"},
  {id:5, start:494, end:649, region:"Unova", badge:"UN", color:"linear-gradient(135deg,#8d6e63,#374151)"},
  {id:6, start:650, end:721, region:"Kalos", badge:"KL", color:"linear-gradient(135deg,#29b6f6,#26c6da)"},
  {id:7, start:722, end:809, region:"Alola", badge:"AL", color:"linear-gradient(135deg,#ffb300,#ff7043)"},
  {id:8, start:810, end:905, region:"Galar", badge:"GA", color:"linear-gradient(135deg,#ec4899,#8b5cf6)"},
  {id:9, start:906, end:1025, region:"Paldea", badge:"PA", color:"linear-gradient(135deg,#66bb6a,#26a69a)"}
];

let owned = JSON.parse(localStorage.getItem("owned") || "{}");
let favourites = JSON.parse(localStorage.getItem("favourites") || "{}");
let activityLog = JSON.parse(localStorage.getItem("activityLog") || "[]");
let settings = JSON.parse(localStorage.getItem("settings") || JSON.stringify({
  homeSearch:"",
  genSearch:"",
  statusFilter:"all",
  homeSearchSubmitted:false
}));

if(typeof settings.homeSearchSubmitted !== "boolean"){
  settings.homeSearchSubmitted = false;
}

const namesCache = {};
let loaded = false;
let currentGenId = null;
let currentPage = "home";

function saveAll(){
  localStorage.setItem("owned", JSON.stringify(owned));
  localStorage.setItem("favourites", JSON.stringify(favourites));
  localStorage.setItem("activityLog", JSON.stringify(activityLog.slice(0, 40)));
  localStorage.setItem("settings", JSON.stringify(settings));
}

function scrollToTopInstant(){
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
}

function scrollToTopAfterRender(){
  scrollToTopInstant();
  requestAnimationFrame(scrollToTopInstant);
  setTimeout(scrollToTopInstant, 20);
}

function cap(str){
  return str.charAt(0).toUpperCase() + str.slice(1);
}

async function loadNames(){
  if(loaded) return;
  try{
    const res = await fetch("https://pokeapi.co/api/v2/pokemon?limit=2000");
    const data = await res.json();
    data.results.forEach((p, i) => {
      let name = p.name
        .split("-")
        .map(part => cap(part))
        .join(" ");
      namesCache[i + 1] = name;
    });
    loaded = true;
  }catch(err){
    for(let i=1;i<=TOTAL_POKEMON;i++){
      namesCache[i] = "Pokemon " + i;
    }
    loaded = true;
  }
}

function getPokemonName(id){
  return namesCache[id] || ("Pokemon " + id);
}

function getNameClass(name){
  if(name.length >= 15) return "name xsmall";
  if(name.length >= 11) return "name small";
  return "name";
}

function getStateLabel(state){
  return state === 2 ? "Owned" : state === 1 ? "Ordered" : "Missing";
}

function getStateClass(state){
  return state === 2 ? "owned" : state === 1 ? "ordered" : "";
}

function formatTime(ts){
  const d = new Date(ts);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function addActivity(text){
  activityLog.unshift({text, ts:Date.now()});
  activityLog = activityLog.slice(0, 25);
  saveAll();
}

function getCounts(rangeStart = 1, rangeEnd = TOTAL_POKEMON){
  let ownedCount = 0;
  let orderedCount = 0;
  let favouriteCount = 0;
  const total = rangeEnd - rangeStart + 1;

  for(let i = rangeStart; i <= rangeEnd; i++){
    if(owned[i] === 2) ownedCount++;
    else if(owned[i] === 1) orderedCount++;
    if(favourites[i]) favouriteCount++;
  }

  const missingCount = total - ownedCount - orderedCount;
  const pct = Math.round((ownedCount / total) * 100);

  return { total, ownedCount, orderedCount, missingCount, favouriteCount, pct };
}

function getGenById(id){
  return gens.find(g => g.id === id);
}

function getGenCounts(gen){
  return getCounts(gen.start, gen.end);
}

function getGenForPokemon(id){
  return gens.find(g => id >= g.start && id <= g.end) || null;
}

function progressBar(percent, complete = false){
  return `
    <div class="progress">
      <div class="progress-fill ${complete ? 'complete' : ''}" style="width:${percent}%"></div>
    </div>
  `;
}

function renderRegionBadge(gen){
  return `<div class="region-badge" style="background:${gen.color}">${gen.badge}</div>`;
}

function searchPokemonIds(query, start = 1, end = TOTAL_POKEMON, showAllWhenBlank = true){
  const q = query.trim().toLowerCase();

  if(!q){
    return showAllWhenBlank
      ? Array.from({length:end-start+1}, (_,i)=>start+i)
      : [];
  }

  const isNumber = /^\d+$/.test(q);
  const results = [];

  if(isNumber){
    const id = parseInt(q, 10);
    if(id >= start && id <= end) results.push(id);
    return results;
  }

  for(let i=start;i<=end;i++){
    const name = getPokemonName(i).toLowerCase();
    if(name === q) results.unshift(i);
    else if(name.includes(q)) results.push(i);
  }

  return results;
}

function applyStatusFilter(ids){
  const filter = settings.statusFilter;
  if(filter === "all") return ids;
  if(filter === "missing") return ids.filter(id => (owned[id] || 0) === 0);
  if(filter === "ordered") return ids.filter(id => (owned[id] || 0) === 1);
  if(filter === "owned") return ids.filter(id => (owned[id] || 0) === 2);
  if(filter === "favourites") return ids.filter(id => !!favourites[id]);
  return ids;
}

function getFilteredIds(start = 1, end = TOTAL_POKEMON, query = "", showAllWhenBlank = true){
  let ids = searchPokemonIds(query, start, end, showAllWhenBlank);
  ids = applyStatusFilter(ids);
  return ids.sort((a,b) => a - b);
}

function renderPokemonCard(id){
  const state = owned[id] || 0;
  const name = getPokemonName(id);
  const isFav = !!favourites[id];

  return `
    <div class="card ${getStateClass(state)} ${isFav ? 'fav-ring' : ''}">
      <div class="card-actions">
        <button class="icon-btn ${isFav ? 'active' : ''}" onclick="toggleFavourite(event, ${id})" aria-label="Toggle favourite">
          ${isFav ? "★" : "☆"}
        </button>
      </div>

      <div class="card-main" onclick="toggleState(${id})">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${name}">
        <div class="number">#${id}</div>
        <div class="${getNameClass(name)}">${name}</div>
        <div class="state-label">${getStateLabel(state)}</div>
      </div>
    </div>
  `;
}

function getAchievementData(){
  const overall = getCounts();
  const completedGens = gens.filter(g => getGenCounts(g).ownedCount === getGenCounts(g).total).length;

  const defs = [
    { key:"starter", title:"Starter Trainer", desc:"Own at least 1 Pokémon.", current:overall.ownedCount, target:1, unit:"owned" },
    { key:"route", title:"Route Explorer", desc:"Own 25 Pokémon.", current:overall.ownedCount, target:25, unit:"owned" },
    { key:"gym", title:"Gym Challenger", desc:"Own 100 Pokémon.", current:overall.ownedCount, target:100, unit:"owned" },
    { key:"johto", title:"Johto Conqueror", desc:"Own 251 Pokémon.", current:overall.ownedCount, target:251, unit:"owned" },
    { key:"regional", title:"Regional Master", desc:"Own 500 Pokémon.", current:overall.ownedCount, target:500, unit:"owned" },
    { key:"elite", title:"Elite Collector", desc:"Own 750 Pokémon.", current:overall.ownedCount, target:750, unit:"owned" },
    { key:"livingdex", title:"Living Dex Hunter", desc:"Own 900 Pokémon.", current:overall.ownedCount, target:900, unit:"owned" },
    { key:"completeall", title:"Catch 'Em All!", desc:"Own all 1025 Pokémon.", current:overall.ownedCount, target:TOTAL_POKEMON, unit:"owned" },
    { key:"gencomplete", title:"Generation Complete", desc:"Fully complete 1 generation.", current:completedGens, target:1, unit:"generations" },
    { key:"multiregion", title:"Multi-Region Legend", desc:"Fully complete 3 generations.", current:completedGens, target:3, unit:"generations" },
    { key:"allregions", title:"All Regions Cleared", desc:"Fully complete all 9 generations.", current:completedGens, target:gens.length, unit:"generations" },
    { key:"favourites", title:"Fan Favourites", desc:"Mark 10 Pokémon as favourites.", current:overall.favouriteCount, target:10, unit:"favourites" },
    { key:"ordered", title:"Incoming Mail Day", desc:"Have 10 Pokémon marked as ordered.", current:overall.orderedCount, target:10, unit:"ordered" }
  ];

  const items = defs.map(item => {
    const rawPct = Math.round((Math.min(item.current, item.target) / item.target) * 100);
    const complete = item.current >= item.target;
    return {...item, pct:rawPct, complete};
  });

  items.sort((a,b) => {
    if(a.complete !== b.complete) return a.complete ? 1 : -1;
    if(a.pct !== b.pct) return b.pct - a.pct;
    return a.title.localeCompare(b.title);
  });

  return items;
}

function renderAchievementList(){
  const items = getAchievementData();

  return `
    <div class="achievements-list">
      ${items.map(item => `
        <div class="achievement-card ${item.complete ? 'complete' : ''}">
          <div class="achievement-top">
            <div>
              <div class="achievement-title">${item.title}</div>
              <div class="achievement-desc">${item.desc}</div>
            </div>
            <div class="achievement-status">${item.complete ? "Complete" : "In progress"}</div>
          </div>
          ${progressBar(item.pct, item.complete)}
          <div class="achievement-meta">
            <span>${item.current}/${item.target} ${item.unit}</span>
            <span>${item.pct}% complete</span>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderHomeSearchResults(ids){
  if(!settings.homeSearchSubmitted){
    return `<div class="empty">Search by name or number to quickly find a Pokémon and see which generation it belongs to.</div>`;
  }

  if(!settings.homeSearch.trim()){
    return `<div class="empty">Enter a Pokémon name or number, then press Search.</div>`;
  }

  if(!ids.length){
    return `<div class="empty">No Pokémon match this search.</div>`;
  }

  return `
    <div class="search-results-list">
      ${ids.map(id => {
        const gen = getGenForPokemon(id);
        const state = owned[id] || 0;
        return `
          <div class="search-result" onclick="jumpToPokemon(${id})">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${getPokemonName(id)}">
            <div class="search-result-main">
              <div class="search-result-title">#${id} ${getPokemonName(id)}</div>
              <div class="search-result-meta">Gen ${gen.id} • ${gen.region}</div>
              <div class="search-result-state">${getStateLabel(state)}</div>
            </div>
            <button class="small" onclick="event.stopPropagation(); jumpToPokemon(${id})">Open</button>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderHome(shouldScroll = true){
  currentPage = "home";
  currentGenId = null;

  document.getElementById("app").classList.add("hidden");
  document.getElementById("achievements-page").classList.add("hidden");

  const home = document.getElementById("home");
  home.classList.remove("hidden");

  const counts = getCounts();
  const recent = activityLog.slice(0, 6);
  const homeSearchResults = settings.homeSearchSubmitted
    ? getFilteredIds(1, TOTAL_POKEMON, settings.homeSearch, false)
    : [];

  let html = `
    <div class="section hero">
      <div class="panel-title">
        <h2>Collector Dashboard</h2>
        <div class="panel-note">Tap a generation to dive in</div>
      </div>

      <div class="hero-title">Build your living Pokédex</div>
      <div class="hero-sub">Track every Pokémon from #1 to #1025, mark orders, favourites, and keep your collection moving.</div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${counts.ownedCount}</div>
          <div class="stat-label">Owned</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.orderedCount}</div>
          <div class="stat-label">Ordered</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.missingCount}</div>
          <div class="stat-label">Missing</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${counts.pct}%</div>
          <div class="stat-label">Complete</div>
        </div>
      </div>

      ${progressBar(counts.pct)}
    </div>

    <div class="section">
      <div class="panel-title">
        <h3>Search the full Pokédex</h3>
        <div class="panel-note">Name or number</div>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <input
            id="home-search"
            class="search-input"
            type="text"
            placeholder="Search all Pokémon..."
            value="${escapeHtml(settings.homeSearch)}"
            oninput="updateHomeSearch(this.value)"
            onkeydown="handleHomeSearchKey(event)"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
          >
          <button class="primary" onclick="submitHomeSearch()">Search</button>
          <button onclick="clearHomeSearch()">Clear</button>
        </div>

        <div class="helper">Search a Pokémon to see its generation, region, and current collection status.</div>

        ${renderHomeSearchResults(homeSearchResults)}
      </div>
    </div>

    <div class="section">
      <div class="panel-title">
        <h3>Generations</h3>
        <div class="panel-note">Region progress</div>
      </div>

      <div class="home-grid">
  `;

  gens.forEach(g => {
    const stats = getGenCounts(g);
    html += `
      <div class="gen-card" onclick="openGen(${g.id}, true)">
        ${renderRegionBadge(g)}
        <div class="gen-title">Gen ${g.id}</div>
        <div class="gen-subtitle">${g.region}</div>
        <div class="gen-stats">${stats.ownedCount}/${stats.total}</div>
        <div class="gen-pct">${stats.pct}% owned</div>
        ${progressBar(stats.pct)}
      </div>
    `;
  });

  html += `
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="panel-title">
          <h3>Recent activity</h3>
          <div class="panel-note">Latest changes</div>
        </div>
        <div class="activity-list">
          ${recent.length
            ? recent.map(item => `<div class="activity-item">${escapeHtml(item.text)}<br><span class="muted">${formatTime(item.ts)}</span></div>`).join("")
            : `<div class="empty">No activity yet.</div>`}
        </div>
      </div>

      <div class="section">
        <div class="panel-title">
          <h3>Backup & tools</h3>
          <div class="panel-note">Keep your data safe</div>
        </div>

        <div class="quick-actions">
          <button class="small" onclick="exportData()">Export backup</button>
          <button class="small" onclick="document.getElementById('import-file').click()">Import backup</button>
          <button class="small danger" onclick="resetAll()">Clear all progress</button>
        </div>

        <div class="note-box" style="margin-top:10px;">
          Your collection is stored in this browser. Export a backup before switching device or clearing browser data.
        </div>
      </div>
    </div>

    <div class="bottom-link-wrap">
      <button onclick="openAchievements(true)">View achievements</button>
    </div>
  `;

  home.innerHTML = html;
  if(shouldScroll) scrollToTopAfterRender();
}

function renderGenSummary(gen){
  const stats = getGenCounts(gen);
  return `
    <div class="section">
      <div class="panel-title">
        <h3>${gen.region} summary</h3>
        <div class="panel-note">Gen ${gen.id}</div>
      </div>

      <div class="inline-stats">
        <div class="mini-stat">
          <div class="mini-stat-value">${stats.ownedCount}</div>
          <div class="mini-stat-label">Owned</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-value">${stats.orderedCount}</div>
          <div class="mini-stat-label">Ordered</div>
        </div>
        <div class="mini-stat">
          <div class="mini-stat-value">${stats.missingCount}</div>
          <div class="mini-stat-label">Missing</div>
        </div>
      </div>

      ${progressBar(stats.pct)}
      <div class="helper" style="margin-top:8px;">${stats.pct}% complete • #${gen.start}–#${gen.end}</div>
    </div>
  `;
}

function renderFilterChips(){
  const chips = [
    {id:"all", label:"All"},
    {id:"missing", label:"Missing"},
    {id:"ordered", label:"Ordered"},
    {id:"owned", label:"Owned"},
    {id:"favourites", label:"Favourites"}
  ];

  return chips.map(ch => `
    <button class="chip ${settings.statusFilter===ch.id ? 'active' : ''}" onclick="updateStatusFilter('${ch.id}')">${ch.label}</button>
  `).join("");
}

function renderPokemonGrid(ids){
  if(!ids.length){
    return `<div class="empty">No Pokémon match this filter.</div>`;
  }

  return `
    <div class="grid">
      ${ids.map(id => renderPokemonCard(id)).join("")}
    </div>
  `;
}

function openGen(id, shouldScroll = true){
  currentPage = "gen";
  currentGenId = id;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("achievements-page").classList.add("hidden");

  const app = document.getElementById("app");
  app.classList.remove("hidden");

  const gen = getGenById(id);
  const ids = getFilteredIds(gen.start, gen.end, settings.genSearch, true);

  let html = `
    <div class="topbar">
      <button onclick="renderHome(true)">← Home</button>
      <div class="topbar-center">${gen.region} • Gen ${gen.id}</div>
      <button class="primary" onclick="saveAll(); alert('Saved!')">Save</button>
    </div>

    ${renderGenSummary(gen)}

    <div class="section">
      <div class="panel-title">
        <h3>Browse Gen ${gen.id}</h3>
        <div class="panel-note">${ids.length} shown</div>
      </div>

      <div class="search-panel">
        <div class="search-row">
          <input
            id="gen-search"
            class="search-input"
            type="text"
            placeholder="Search this generation..."
            value="${escapeHtml(settings.genSearch)}"
            oninput="updateGenSearch(this.value)"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
          >
          <button onclick="clearGenSearch()">Clear</button>
        </div>

        <div class="filter-row">
          ${renderFilterChips()}
        </div>

        <div class="quick-actions">
          <button class="small" onclick="markGenState(${gen.id}, 0)">Mark all missing</button>
          <button class="small" onclick="markGenState(${gen.id}, 1)">Mark all ordered</button>
          <button class="small" onclick="markGenState(${gen.id}, 2)">Mark all owned</button>
          <button class="small" onclick="clearGenFavourites(${gen.id})">Clear gen favourites</button>
        </div>
      </div>
    </div>

    <div class="section">
      ${renderPokemonGrid(ids)}
    </div>
  `;

  app.innerHTML = html;
  if(shouldScroll) scrollToTopAfterRender();
}

function openAchievements(shouldScroll = true){
  currentPage = "achievements";
  currentGenId = null;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("app").classList.add("hidden");

  const page = document.getElementById("achievements-page");
  page.classList.remove("hidden");

  const data = getAchievementData();
  const completeCount = data.filter(a => a.complete).length;

  page.innerHTML = `
    <div class="topbar">
      <button onclick="renderHome(true)">← Home</button>
      <div class="topbar-center">Achievements</div>
      <div style="width:74px;"></div>
    </div>

    <div class="section">
      <div class="panel-title">
        <h3>Achievement progress</h3>
        <div class="panel-note">${completeCount}/${data.length} complete</div>
      </div>
      <div class="helper">In progress achievements are shown first by highest completion percentage. Completed ones are moved to the bottom.</div>
    </div>

    <div class="section">
      ${renderAchievementList()}
    </div>
  `;

  if(shouldScroll) scrollToTopAfterRender();
}

function toggleState(id){
  const prev = owned[id] || 0;
  const next = (prev + 1) % 3;
  owned[id] = next;
  saveAll();

  const name = getPokemonName(id);
  addActivity(`${name} (#${id}) set to ${getStateLabel(next)}`);

  rerender(false);
}

function toggleFavourite(event, id){
  event.stopPropagation();
  favourites[id] = !favourites[id];
  if(!favourites[id]) delete favourites[id];
  saveAll();

  const name = getPokemonName(id);
  addActivity(`${name} (#${id}) ${favourites[id] ? 'added to favourites' : 'removed from favourites'}`);

  rerender(false);
}

function updateHomeSearch(value){
  settings.homeSearch = value;
  settings.homeSearchSubmitted = false;
  saveAll();
}

function submitHomeSearch(){
  settings.homeSearchSubmitted = true;
  saveAll();
  renderHome(false);

  const el = document.getElementById("home-search");
  if(el) el.focus();
}

function handleHomeSearchKey(event){
  if(event.key === "Enter"){
    event.preventDefault();
    submitHomeSearch();
  }
}

function clearHomeSearch(){
  settings.homeSearch = "";
  settings.homeSearchSubmitted = false;
  saveAll();
  renderHome(false);
}

function updateGenSearch(value){
  settings.genSearch = value;
  saveAll();
  if(currentGenId) openGen(currentGenId, false);

  setTimeout(() => {
    const el = document.getElementById("gen-search");
    if(el){
      el.focus();
      const len = el.value.length;
      el.setSelectionRange(len, len);
    }
  }, 0);
}

function clearGenSearch(){
  settings.genSearch = "";
  saveAll();
  if(currentGenId) openGen(currentGenId, false);
}

function updateStatusFilter(value){
  settings.statusFilter = value;
  saveAll();
  rerender(false);
}

function rerender(shouldScroll = false){
  if(currentPage === "gen" && currentGenId){
    openGen(currentGenId, shouldScroll);
    return;
  }
  if(currentPage === "achievements"){
    openAchievements(shouldScroll);
    return;
  }
  renderHome(shouldScroll);
}

function jumpToPokemon(id){
  const gen = gens.find(g => id >= g.start && id <= g.end);
  if(!gen) return;
  settings.genSearch = String(id);
  saveAll();
  openGen(gen.id, true);
}

function markGenState(genId, state){
  const gen = getGenById(genId);
  if(!gen) return;

  for(let i=gen.start;i<=gen.end;i++){
    owned[i] = state;
  }
  saveAll();
  addActivity(`${gen.region} marked as ${getStateLabel(state)}`);
  openGen(genId, false);
}

function clearGenFavourites(genId){
  const gen = getGenById(genId);
  for(let i=gen.start;i<=gen.end;i++){
    delete favourites[i];
  }
  saveAll();
  addActivity(`Cleared favourites in ${gen.region}`);
  openGen(genId, false);
}

function exportData(){
  const payload = {
    version:1,
    exportedAt:new Date().toISOString(),
    owned,
    favourites,
    activityLog,
    settings
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pokedex-tracker-backup.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  addActivity("Exported collection backup");
  rerender(false);
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);

      if(data.owned && typeof data.owned === "object") owned = data.owned;
      if(data.favourites && typeof data.favourites === "object") favourites = data.favourites;
      if(Array.isArray(data.activityLog)) activityLog = data.activityLog;
      if(data.settings && typeof data.settings === "object"){
        settings = {
          homeSearch:"",
          genSearch:"",
          statusFilter:data.settings.statusFilter || "all",
          homeSearchSubmitted:false
        };
      }

      saveAll();
      addActivity("Imported collection backup");
      rerender(false);
      alert("Import complete!");
    }catch(err){
      alert("That backup file could not be read.");
    }
  };
  reader.readAsText(file);
}

function resetAll(){
  const ok = confirm("Clear all progress, favourites, and activity?");
  if(!ok) return;

  owned = {};
  favourites = {};
  activityLog = [];
  settings = {
    homeSearch:"",
    genSearch:"",
    statusFilter:"all",
    homeSearchSubmitted:false
  };
  saveAll();
  renderHome(false);
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

document.getElementById("import-file").addEventListener("change", function(e){
  const file = e.target.files && e.target.files[0];
  if(file) importDataFromFile(file);
  e.target.value = "";
});

async function init(){
  await loadNames();
  renderHome(false);
}

init();
</script>

</body>
</html>
